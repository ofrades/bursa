name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

  deploy:
    name: Kamal Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H mohshoo.tailf9eafe.ts.net >> ~/.ssh/known_hosts

      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets << EOF
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_CREDITS_10=${{ secrets.STRIPE_PRICE_CREDITS_10 }}
          EOF
          chmod 600 .kamal/secrets

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          source .kamal/secrets
          for var in AUTH_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET OPENROUTER_API_KEY CRON_SECRET; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required deploy secret: $var" >&2
              exit 1
            fi
          done

      - name: Ensure VPS data directory exists
        run: ssh root@mohshoo.tailf9eafe.ts.net 'mkdir -p /var/lib/bursa/data'

      - name: Deploy
        run: kamal deploy
