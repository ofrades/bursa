# Kamal 2.x — Bursa
# Usage:
#   kamal setup    # first time — prepares the host and kamal-proxy
#   kamal deploy   # build image, push, restart container
#   kamal logs     # tail logs
#   kamal console  # open a node repl in the app container

service: bursa
image: bursa

servers:
  web:
    hosts:
      - mohshoo.tailf9eafe.ts.net
    options:
      volume:
        - /var/lib/bursa/data:/app/data

# Local Docker registry accessed over an SSH tunnel.
registry:
  server: localhost:5000

builder:
  arch: amd64

proxy:
  host: bursa.mohshoo.com
  app_port: 3000
  healthcheck:
    path: /api/health

env:
  clear:
    PORT: 3000
    NODE_ENV: production
    BETTER_AUTH_URL: https://bursa.mohshoo.com
    DB_PATH: /app/data/stocktrack.sqlite
  secret:
    - AUTH_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - OPENROUTER_API_KEY
    - CRON_SECRET
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRICE_CREDITS_10

# Cloudflare Tunnel should target http://kamal-proxy:80 for bursa.mohshoo.com.
