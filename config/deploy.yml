# Kamal 2.x — Bursa
# Usage:
#   kamal setup    # first time — prepares the host and kamal-proxy
#   kamal deploy   # build image, push, restart container
#   kamal logs     # tail logs
#   kamal console  # open a node repl in the app container

service: bursa
image: ofrades/bursa

servers:
  web:
    hosts:
      - mohshoo.tailf9eafe.ts.net
    options:
      volume:
        - /var/lib/bursa/data:/app/data

# Publish images to GitHub Container Registry so local deploys do not
# depend on an SSH-tunneled Docker registry.
registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

proxy:
  host: bursa.mohshoo.com
  app_port: 3000
  response_timeout: 300 # AI calls can take up to ~2 min; Cloudflare allows up to 600s on paid plans
  healthcheck:
    path: /api/health

env:
  clear:
    PORT: 3000
    NODE_ENV: production
    BETTER_AUTH_URL: https://bursa.mohshoo.com
    DB_PATH: /app/data/stocktrack.sqlite
    BILLING_MARKUP_MULTIPLIER: 1.8
    BILLING_MIN_CENTS: 2
    BILLING_USD_TO_EUR: 0.92
  secret:
    - AUTH_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - OPENROUTER_API_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRICE_CREDITS_10
# Cloudflare Tunnel should target http://127.0.0.1:80 on the VPS for
# bursa.mohshoo.com. kamal-proxy is published on host port 80.
